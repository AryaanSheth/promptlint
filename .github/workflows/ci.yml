name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: cli
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest

      - name: Run tests
        working-directory: cli
        run: pytest tests/ -v

  npm:
    name: npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: npm
        run: npm install

      - name: Build and typecheck
        working-directory: npm
        run: npm run build

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm engine (dependency)
        working-directory: npm
        run: npm install && npm run build

      - name: Install vscode extension deps
        working-directory: vscode
        run: npm install

      - name: Compile extension
        working-directory: vscode
        run: npm run compile

  action:
    name: Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # npm engine must be built first — action depends on file:../npm
      - name: Build npm engine
        working-directory: npm
        run: npm install && npm run build

      - name: Install action dependencies
        working-directory: action
        run: npm install

      - name: Typecheck action
        working-directory: action
        run: npm run typecheck

      - name: Build action dist
        working-directory: action
        run: npm run build

      - name: Verify dist is committed
        run: |
          if ! git diff --quiet action/dist/; then
            echo "ERROR: action/dist/ is stale. Run 'cd action && npm run build' locally and commit the result."
            git diff --stat action/dist/
            exit 1
          fi
          echo "action/dist/ is up-to-date."

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: python
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        working-directory: cli
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
          password: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: npm
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        working-directory: npm
        run: npm install && npm run build

      - name: Publish
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
