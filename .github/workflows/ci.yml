name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: cli
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-cov mypy bandit hypothesis

      - name: Type-check (mypy)
        working-directory: cli
        run: mypy promptlint/ --ignore-missing-imports

      - name: Security scan (bandit)
        working-directory: cli
        run: bandit -r promptlint/ -ll -q

      - name: Run tests with coverage
        working-directory: cli
        run: pytest tests/ -v --cov=promptlint --cov-report=term-missing --cov-fail-under=80

  parity:
    name: Rule parity check
    runs-on: ubuntu-latest
    needs: [python, npm]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python CLI
        working-directory: cli
        run: pip install -e .

      - name: Build npm engine
        working-directory: npm
        run: npm install && npm run build

      - name: Validate Python registry matches manifest
        working-directory: cli
        run: python -m pytest tests/test_parity.py -v

      - name: Validate TypeScript RULE_IDS matches manifest
        run: |
          node - << 'EOF'
          const manifest = require('./rules-manifest.json').rules;
          const engine  = require('./npm/dist/engine.js');
          const tsIds   = [...engine.RULE_IDS].sort();
          const mfIds   = [...manifest].sort();
          const missing = mfIds.filter(id => !tsIds.includes(id));
          const extra   = tsIds.filter(id => !mfIds.includes(id));
          if (missing.length) {
            console.error('Rules in manifest but missing from TypeScript engine:', missing);
            process.exit(1);
          }
          if (extra.length) {
            console.error('Rules in TypeScript engine but missing from manifest:', extra);
            process.exit(1);
          }
          console.log(`Parity OK — ${tsIds.length} rules in sync.`);
          EOF

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: cli
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest

      - name: Run benchmark tests
        working-directory: cli
        run: pytest tests/test_performance.py -m slow -v

  npm:
    name: npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: npm
        run: npm install

      - name: Lint (eslint)
        working-directory: npm
        run: npm run lint

      - name: Build and typecheck
        working-directory: npm
        run: npm run build

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    needs: npm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm engine (dependency)
        working-directory: npm
        run: npm install && npm run build

      - name: Install vscode extension deps
        working-directory: vscode
        run: npm install

      - name: Compile extension
        working-directory: vscode
        run: npm run compile

  action:
    name: Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # npm engine must be built first — action depends on file:../npm
      - name: Build npm engine
        working-directory: npm
        run: npm install && npm run build

      - name: Install action dependencies
        working-directory: action
        run: npm install

      - name: Typecheck action
        working-directory: action
        run: npm run typecheck

      - name: Build action dist
        working-directory: action
        run: npm run build

      - name: Verify dist is committed
        run: |
          if ! git diff --quiet action/dist/; then
            echo "ERROR: action/dist/ is stale. Run 'cd action && npm run build' locally and commit the result."
            git diff --stat action/dist/
            exit 1
          fi
          echo "action/dist/ is up-to-date."

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [python, parity]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        working-directory: cli
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
          password: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [npm, parity]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        working-directory: npm
        run: npm install && npm run build

      - name: Publish
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
